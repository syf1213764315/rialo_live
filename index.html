<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rialo Wbe3 live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-text {
            background: linear-gradient(90deg, #818cf8, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .reward-card:hover {
            transform: translateY(-4px);
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);
        }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="min-h-screen flex flex-col">

    <!-- 导航栏 -->
    <nav class="glass-panel sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20 overflow-hidden">
                        <img src="logo.jpg" alt="Logo" class="w-full h-full object-cover">
                    </div>
            <span class="text-xl font-bold tracking-tight">Rialo<span class="gradient-text">Live</span></span>
        </div>

        <div class="flex items-center space-x-4">
            <div id="wallet-status" class="hidden md:flex items-center space-x-2 bg-slate-800 px-3 py-1.5 rounded-full border border-slate-700">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-sm text-slate-400 font-mono" id="wallet-address">0x71C...3921</span>
            </div>
            <button id="connect-btn" onclick="toggleWallet()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-semibold transition-all shadow-lg shadow-indigo-600/20 active:scale-95">
                连接钱包
            </button>
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- 左侧：直播播放器 -->
        <div class="lg:col-span-8 space-y-6">
            <div class="relative aspect-video bg-black rounded-3xl overflow-hidden shadow-2xl border border-slate-800">
                <!-- 视频元素（默认隐藏，点击后加载流） -->
                <video id="live-player" class="absolute inset-0 w-full h-full object-cover" controls playsinline style="display:none;"></video>

                <!-- 模拟视频封面（点击播放后会隐藏） -->
                <div id="video-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900">
                    <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=1000" class="absolute inset-0 w-full h-full object-cover opacity-40 blur-sm" alt="Live Background">
                    <div class="relative z-10 text-center">
                        <button id="play-btn" onclick="startStream()" class="w-20 h-20 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center text-white transition-all group">
                            <i class="fas fa-play text-2xl group-hover:scale-110 transition-transform"></i>
                        </button>
                        <p class="mt-4 text-slate-300 font-medium">点击加载直播内容</p>
                    </div>
                </div>
                
                <!-- 直播状态标签 -->
                <div class="absolute top-6 left-6 flex space-x-2">
                    <span class="bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-md flex items-center">
                        <span class="w-1.5 h-1.5 bg-white rounded-full mr-2 animate-ping"></span> 直播中
                    </span>
                    <span class="bg-black/40 backdrop-blur-md text-white text-xs font-bold px-3 py-1 rounded-md">
                        <i class="far fa-user mr-1"></i> 12,482 观看
                    </span>
                </div>
            </div>

            <!-- 主播信息 -->
            <div class="glass-panel p-6 rounded-3xl flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex items-center space-x-4">
                    <img src="EFq-H2Uq_400x400.jpg" class="w-14 h-14 rounded-2xl bg-indigo-100" alt="Avatar">
                    <div>
                        <h2 class="text-xl font-bold">ayun24335167</h2>
                        <p class="text-slate-400 text-sm">正在直播: 探索以太坊 L2 层的未来机遇 🚀</p>
                    </div>
                </div>
                <div class="flex space-x-3">
                    <button class="flex-1 md:flex-none px-6 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-xl font-medium transition-colors">关注</button>
                    <button class="flex-1 md:flex-none px-6 py-2.5 bg-indigo-600/20 text-indigo-400 border border-indigo-600/30 rounded-xl font-medium">分享</button>
                </div>
            </div>
        </div>

        <!-- 右侧：打赏与聊天 -->
        <div class="lg:col-span-4 flex flex-col gap-6">
            
            <!-- 打赏面板 -->
            <div class="glass-panel p-6 rounded-3xl flex flex-col h-full border-t-4 border-t-indigo-500">
                <div class="mb-6">
                    <h3 class="text-lg font-bold flex items-center">
                        <i class="fas fa-gem text-indigo-400 mr-2"></i> 链上打赏
                    </h3>
                    <p class="text-slate-400 text-xs mt-1">支持 ETH, USDC 及主流代币</p>
                </div>

                <!-- 礼物网格 -->
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <button onclick="selectGift('Coffee', 0.001)" class="reward-card glass-panel p-4 rounded-2xl text-center border border-slate-700 hover:border-indigo-500 group transition-all">
                        <span class="text-2xl mb-2 block">☕</span>
                        <span class="block text-sm font-bold">咖啡</span>
                        <span class="text-xs text-indigo-400 font-mono">0.001 ETH</span>
                    </button>
                    <button onclick="selectGift('Beer', 0.005)" class="reward-card glass-panel p-4 rounded-2xl text-center border border-slate-700 hover:border-indigo-500 group transition-all">
                        <span class="text-2xl mb-2 block">🍺</span>
                        <span class="block text-sm font-bold">啤酒</span>
                        <span class="text-xs text-indigo-400 font-mono">0.005 ETH</span>
                    </button>
                    <button onclick="selectGift('Rocket', 0.05)" class="reward-card glass-panel p-4 rounded-2xl text-center border border-slate-700 hover:border-indigo-500 group transition-all">
                        <span class="text-2xl mb-2 block">🚀</span>
                        <span class="block text-sm font-bold">火箭</span>
                        <span class="text-xs text-indigo-400 font-mono">0.05 ETH</span>
                    </button>
                    <button onclick="selectGift('Planet', 0.2)" class="reward-card glass-panel p-4 rounded-2xl text-center border border-slate-700 hover:border-indigo-500 group transition-all">
                        <span class="text-2xl mb-2 block">🪐</span>
                        <span class="block text-sm font-bold">行星</span>
                        <span class="text-xs text-indigo-400 font-mono">0.2 ETH</span>
                    </button>
                </div>

                <!-- 自定义金额 -->
                <div class="space-y-4 mb-6">
                    <label class="text-xs text-slate-400 uppercase tracking-wider font-bold">自定义打赏金额 (ETH)</label>
                    <div class="relative">
                        <input type="number" id="custom-amount" placeholder="0.00" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition-all font-mono">
                        <span class="absolute right-4 top-3.5 text-slate-500 text-sm">MAX</span>
                    </div>
                </div>

                <button onclick="handleTip()" id="tip-btn" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white rounded-2xl font-bold text-lg shadow-xl shadow-indigo-600/20 transition-all active:scale-[0.98]">
                    立即打赏
                </button>

                <!-- 最近打赏榜单 -->
                <div class="mt-8">
                    <h4 class="text-xs text-slate-500 uppercase font-bold mb-4 tracking-widest text-center italic">—— 贡献榜 ——</h4>
                    <div class="space-y-4">
                        <div class="flex items-center justify-between text-sm">
                            <div class="flex items-center">
                                <span class="text-orange-400 font-bold mr-3 italic">1.</span>
                                <span class="text-slate-300">0x2b...a3e</span>
                            </div>
                            <span class="font-mono text-indigo-300">2.5 ETH</span>
                        </div>
                        <div class="flex items-center justify-between text-sm">
                            <div class="flex items-center">
                                <span class="text-slate-400 font-bold mr-3 italic">2.</span>
                                <span class="text-slate-300">vitalik.eth</span>
                            </div>
                            <span class="font-mono text-indigo-300">1.2 ETH</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 弹窗通知组件 -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 glass-panel px-6 py-4 rounded-2xl shadow-2xl transition-all duration-500 transform translate-y-32 opacity-0 z-[100] border-l-4 border-indigo-500">
        <div class="flex items-center space-x-3">
            <i id="toast-icon" class="fas fa-check-circle text-green-400 text-xl"></i>
            <span id="toast-msg" class="text-sm font-medium"></span>
        </div>
    </div>

    <script>
        let isWalletConnected = false;

        function toggleWallet() {
            const btn = document.getElementById('connect-btn');
            const status = document.getElementById('wallet-status');
            
            if (!isWalletConnected) {
                // 模拟连接动画
                btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i>';
                btn.disabled = true;
                
                setTimeout(() => {
                    isWalletConnected = true;
                    btn.innerHTML = '断开连接';
                    btn.classList.replace('bg-indigo-600', 'bg-slate-700');
                    btn.disabled = false;
                    status.classList.remove('hidden');
                    showToast('钱包连接成功！', 'success');
                }, 800);
            } else {
                isWalletConnected = false;
                btn.innerHTML = '连接钱包';
                btn.classList.replace('bg-slate-700', 'bg-indigo-600');
                status.classList.add('hidden');
                showToast('已断开连接', 'info');
            }
        }

        function selectGift(name, amount) {
            document.getElementById('custom-amount').value = amount;
            showToast(`已选择 ${name}`, 'info');
        }

        function handleTip() {
            if (!isWalletConnected) {
                showToast('请先连接钱包', 'error');
                return;
            }

            const amount = document.getElementById('custom-amount').value;
            if (!amount || amount <= 0) {
                showToast('请输入有效的打赏金额', 'error');
                return;
            }

            const tipBtn = document.getElementById('tip-btn');
            const originalText = tipBtn.innerHTML;
            
            tipBtn.disabled = true;
            tipBtn.innerHTML = '<i class="fas fa-circle-notch animate-spin mr-2"></i> 交易处理中...';

            // 模拟链上交互
            setTimeout(() => {
                tipBtn.innerHTML = '<i class="fas fa-check-circle mr-2"></i> 成功！';
                showToast(`成功打赏 ${amount} ETH！感谢你的支持。`, 'success');
                
                setTimeout(() => {
                    tipBtn.innerHTML = originalText;
                    tipBtn.disabled = false;
                    document.getElementById('custom-amount').value = '';
                }, 2000);
            }, 2500);
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            const toastIcon = document.getElementById('toast-icon');

            toastMsg.innerText = msg;
            
            if(type === 'error') {
                toastIcon.className = 'fas fa-exclamation-circle text-red-400 text-xl';
            } else if(type === 'info') {
                toastIcon.className = 'fas fa-info-circle text-blue-400 text-xl';
            } else {
                toastIcon.className = 'fas fa-check-circle text-green-400 text-xl';
            }

            toast.classList.remove('translate-y-32', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-32', 'opacity-0');
            }, 3000);
        }
        
        // --- HLS 播放逻辑 ---
        const STREAM_URL = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8'; // 可替换为真实直播 m3u8 地址
        let hlsInstance = null;

        function startStream() {
            const overlay = document.getElementById('video-overlay');
            const player = document.getElementById('live-player');
            if (!player) return;

            // 隐藏封面，显示 video 元素
            if (overlay) overlay.style.display = 'none';
            player.style.display = 'block';

            // 使用 hls.js 在非 Safari 浏览器上播放 m3u8
            if (window.Hls && Hls.isSupported()) {
                if (hlsInstance) {
                    try { hlsInstance.destroy(); } catch (e) { /* ignore */ }
                    hlsInstance = null;
                }

                hlsInstance = new Hls();
                hlsInstance.loadSource(STREAM_URL);
                hlsInstance.attachMedia(player);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                    player.play().catch(() => {});
                });
                hlsInstance.on(Hls.Events.ERROR, function(event, data) {
                    console.error('HLS error', event, data);
                    showToast('直播播放发生错误，请稍后重试', 'error');
                });
            } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari / iOS 原生支持
                player.src = STREAM_URL;
                player.addEventListener('loadedmetadata', () => player.play());
            } else {
                showToast('当前浏览器不支持 HLS 播放，请使用 Safari 或支持 HLS 的浏览器。', 'error');
            }
        }
    </script>
</body>
</html>
